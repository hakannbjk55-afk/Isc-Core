name: ci
on:
  push:
  pull_request:

jobs:
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run vector verifier
        run: |
          set -e
          echo "[CI] Running vector verifier..."
          python3 --version || true
          if [ -f tools/vector_verifier.py ]; then
            python3 tools/vector_verifier.py
          else
            echo "[CI] WARNING: tools/vector_verifier.py not found, skipping."
          fi
