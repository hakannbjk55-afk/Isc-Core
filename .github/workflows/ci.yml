name: ci
on:
  push:
  pull_request:

jobs:
  vectors:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.1.1

      - name: Run vector verifier (policy)
        run: |
          set -e
          sh tools/ci_policy.sh

      - name: Upload CI report artifact
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ci-report
          path: artifacts/ci_report.json
          if-no-files-found: error
          retention-days: 30
