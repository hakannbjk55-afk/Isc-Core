name: Reproducible Gate

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run CI Policy (full gate)
        run: |
          set -euo pipefail
          chmod +x tools/ci_policy.sh
          ./tools/ci_policy.sh

      - name: Capture ENV+TIME fingerprint
        run: |
          set -euo pipefail
          chmod +x tools/ci_fingerprint.sh
          ./tools/ci_fingerprint.sh
          echo "[ci] envtime_sha=$(cat artifacts/envtime.sha256)"
