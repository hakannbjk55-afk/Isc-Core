<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BuildSeal Verification Report</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:monospace;padding:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;max-width:600px;margin:20px auto;overflow:hidden}
.header{padding:16px;border-bottom:1px solid #30363d}
.header h1{font-size:13px;letter-spacing:2px;color:#8b949e}
.header p{font-size:11px;color:#484f58;margin-top:4px}
.badge{display:inline-block;padding:6px 16px;border-radius:4px;font-size:12px;font-weight:bold;letter-spacing:1px}
.badge.good{background:#0d4429;color:#3fb950;border:1px solid #238636}
.badge.bad{background:#3d1a1a;color:#f85149;border:1px solid #da3633}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:16px}
.row{padding:12px 16px;border-top:1px solid #30363d}
.k{font-size:11px;color:#8b949e;margin-bottom:4px}
.v{font-size:12px;color:#e6edf3;word-break:break-all}
.v a{color:#58a6ff;text-decoration:none}
.footer{padding:12px 16px;border-top:1px solid #30363d;font-size:11px;color:#484f58;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>BUILDSEAL VERIFICATION REPORT</h1>
    <p id="generated"></p>
  </div>
  <div class="status-row">
    <span class="k">STATUS</span>
    <span class="badge bad" id="badge">LOADING...</span>
  </div>
  <div class="row"><div class="k">Release ID</div><div class="v" id="releaseId">—</div></div>
  <div class="row"><div class="k">Chain</div><div class="v">Base Sepolia (Ethereum L2)</div></div>
  <div class="row"><div class="k">Anchor TX</div><div class="v" id="tx">—</div></div>
  <div class="row"><div class="k">Contract</div><div class="v" id="contract">—</div></div>
  <div class="row"><div class="k">Merkle Root</div><div class="v" id="merkleRoot">—</div></div>
  <div class="row"><div class="k">Batch ID</div><div class="v" id="batchId">—</div></div>
  <div class="row"><div class="k">Meta Hash</div><div class="v" id="metaHash">—</div></div>
  <div class="row"><div class="k">Anchored By</div><div class="v" id="anchoredBy">—</div></div>
  <div class="row"><div class="k">Proof Status</div><div class="v" id="proofStatus">—</div></div>
  <div class="footer">Open source verifier · Independently verifiable</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
const CONFIG = {
  rpc: "https://sepolia.base.org",
  contract: "0x0a93c4cF810F68e8FBeEa63ddb36d0f06da96bFE",
  explorerTx: tx => `https://sepolia.basescan.org/tx/${tx}`,
  explorerAddr: addr => `https://sepolia.basescan.org/address/${addr}`,
  eventAbi: ["event Anchored(bytes32 indexed merkleRoot, uint256 indexed batchId, bytes32 metaHash, address sender)"]
};

const $ = id => document.getElementById(id);

function getReleaseId() {
  const parts = location.pathname.split("/").filter(Boolean);
  if (parts[0] === "release" && parts[1]) return parts[1];
  return null;
}

async function main() {
  $("generated").textContent = "Generated: " + new Date().toISOString().replace("T"," ").split(".")[0] + " UTC";
  const releaseId = getReleaseId();
  $("releaseId").textContent = releaseId || "—";
  $("contract").innerHTML = `<a href="${CONFIG.explorerAddr(CONFIG.contract)}" target="_blank">${CONFIG.contract} ↗</a>`;

  if (!releaseId || !releaseId.startsWith("0x")) {
    setBadge(false);
    $("proofStatus").textContent = "Expected: /release/0x<tx_hash>";
    return;
  }

  $("tx").innerHTML = `<a href="${CONFIG.explorerTx(releaseId)}" target="_blank">${releaseId} ↗</a>`;
  $("proofStatus").textContent = "Verifying on-chain anchor...";

  try {
    const provider = new ethers.providers.JsonRpcProvider(CONFIG.rpc);
    const receipt = await provider.getTransactionReceipt(releaseId);
    if (!receipt) { setBadge(false); $("proofStatus").textContent = "TX not found on chain."; return; }

    const iface = new ethers.utils.Interface(CONFIG.eventAbi);
    let found = false;
    for (const log of receipt.logs) {
      try {
        const decoded = iface.parseLog(log);
        $("merkleRoot").textContent = decoded.args.merkleRoot;
        $("batchId").textContent = decoded.args.batchId.toString();
        $("metaHash").textContent = decoded.args.metaHash;
        $("anchoredBy").textContent = decoded.args.sender;
        setBadge(true);
        $("proofStatus").textContent = "Valid — on-chain Anchored event confirmed.";
        found = true;
        break;
      } catch(e) {}
    }
    if (!found) { setBadge(false); $("proofStatus").textContent = "Anchored event not found in TX logs."; }
  } catch(e) {
    setBadge(false);
    $("proofStatus").textContent = "Error: " + e.message;
  }
}

function setBadge(ok) {
  const b = $("badge");
  b.textContent = ok ? "✅ VERIFIED" : "❌ INVALID";
  b.className = "badge " + (ok ? "good" : "bad");
}

main();
</script>
</body>
</html>
